services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: isucon
      MYSQL_DATABASE: isubid
      MYSQL_USER: isucon
      MYSQL_PASSWORD: isucon
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uisucon", "-pisucon"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  mysql-data:
